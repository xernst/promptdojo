solution: |
  def billing_specialist(q):
      return {"answer": "refunded", "tools_used": 1}

  def technical_specialist(q):
      return {"answer": "restarted", "tools_used": 2}

  def general_specialist(q):
      if "open" in q or "hour" in q:
          return {"answer": "hours: 9-5", "tools_used": 0}
      return {"answer": "fallback answer", "tools_used": 0}

  SPECIALISTS = {
      "billing":   billing_specialist,
      "technical": technical_specialist,
      "general":   general_specialist,
  }

  classifier_outputs = iter(["BILLING", " technical ", "general", "weird_unknown"])

  def fake_classifier(question):
      return next(classifier_outputs)

  def run_router(question):
      raw = fake_classifier(question)
      category = raw.strip().lower()
      if category not in SPECIALISTS:
          category = "general"
      result = SPECIALISTS[category](question)
      return {
          "category": category,
          "answer": result["answer"],
          "tools_used": result["tools_used"],
      }

  questions = [
      "Refund my subscription",
      "Site is throwing 500s",
      "What hours are you open?",
      "totally off topic",
  ]
  for q in questions:
      r = run_router(q)
      print(f"category={r['category']} tools={r['tools_used']} answer={r['answer']}")
