solution: |
  good_drafts = iter([
      "Cats are animals.",
      "Cats are small carnivorous mammals.",
  ])
  good_verdicts = iter([
      {"status": "REJECT", "feedback": "Too short."},
      {"status": "PASS",   "feedback": "Detailed."},
  ])

  bad_drafts = iter(["v1", "v2"])
  bad_verdicts = iter([
      {"status": "REJECT", "feedback": "no"},
      {"status": "REJECT", "feedback": "still no"},
  ])

  current = {"drafts": good_drafts, "verdicts": good_verdicts}

  def gen(task, feedback=None):
      return next(current["drafts"])

  def judge(draft):
      return next(current["verdicts"])

  def write_with_judge(task, max_iters):
      feedback = None
      draft = None
      for i in range(max_iters):
          draft = gen(task, feedback=feedback)
          verdict = judge(draft)
          if verdict["status"] == "PASS":
              return {"draft": draft, "iters": i + 1, "passed": True}
          feedback = verdict["feedback"]
      return {"draft": draft, "iters": max_iters, "passed": False}

  current["drafts"], current["verdicts"] = good_drafts, good_verdicts
  r = write_with_judge("describe cats", 3)
  print(f"passed={r['passed']} iters={r['iters']} draft={r['draft']}")

  current["drafts"], current["verdicts"] = bad_drafts, bad_verdicts
  r = write_with_judge("describe cats", 2)
  print(f"passed={r['passed']} iters={r['iters']} draft={r['draft']}")
hint:
  - level: 1
    body: 'Track `feedback` as a local variable starting at `None`. Inside the loop: call `gen(task, feedback=feedback)`, judge the result, branch on PASS, otherwise update `feedback = verdict["feedback"]`. After the loop: return the last draft with `passed=False`.'
  - level: 2
    body: |
      ```python
      def write_with_judge(task, max_iters):
          feedback = None
          draft = None
          for i in range(max_iters):
              draft = gen(task, feedback=feedback)
              verdict = judge(draft)
              if verdict["status"] == "PASS":
                  return {"draft": draft, "iters": i + 1, "passed": True}
              feedback = verdict["feedback"]
          return {"draft": draft, "iters": max_iters, "passed": False}
      ```
