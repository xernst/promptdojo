concept: evaluator-optimizer-iteration-trace
code: |
  # the judge rejects the first two drafts, then accepts the third.

  drafts = iter([
      "Cats are animals.",
      "Cats are small mammals.",
      "Cats are small carnivorous mammals kept as pets worldwide.",
  ])
  verdicts = iter([
      {"status": "REJECT", "feedback": "Too short."},
      {"status": "REJECT", "feedback": "Add detail about diet."},
      {"status": "PASS",   "feedback": "Detailed and accurate."},
  ])

  def gen(task, feedback=None):
      return next(drafts)

  def judge(draft):
      return next(verdicts)

  def write_with_judge(task, max_iters=5):
      draft = gen(task)
      for i in range(max_iters):
          verdict = judge(draft)
          if verdict["status"] == "PASS":
              return i + 1
          draft = gen(task, feedback=verdict["feedback"])
      return max_iters

  iterations = write_with_judge("Describe cats")
  print(f"iterations: {iterations}")
prompt: |
  Read the editor. The fake judge rejects drafts 1 and 2, then accepts
  draft 3. The function returns the iteration count when the judge
  PASSES. How many iterations does it take?
