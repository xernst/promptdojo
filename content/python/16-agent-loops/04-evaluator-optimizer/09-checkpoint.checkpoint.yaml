solution: |
  good_drafts = iter(["v1-rough", "v2-better", "v3-good"])
  good_verdicts = iter([
      {"status": "REJECT", "feedback": "rough"},
      {"status": "REJECT", "feedback": "better but not enough"},
      {"status": "PASS",   "feedback": "great"},
  ])

  bad_drafts = iter(["stub1", "stub2"])
  bad_verdicts = iter([
      {"status": "REJECT", "feedback": "still no"},
      {"status": "REJECT", "feedback": "really no"},
  ])

  current = {"drafts": good_drafts, "verdicts": good_verdicts}

  def gen(task, feedback=None):
      return next(current["drafts"])

  def judge(draft):
      return next(current["verdicts"])

  def optimize(task, max_iters):
      feedback = None
      draft = None
      history = []
      for i in range(max_iters):
          draft = gen(task, feedback=feedback)
          verdict = judge(draft)
          history.append({
              "iter": i + 1,
              "draft": draft,
              "status": verdict["status"],
              "feedback": verdict["feedback"],
          })
          if verdict["status"] == "PASS":
              return {
                  "final_draft": draft,
                  "iters": i + 1,
                  "passed": True,
                  "history": history,
              }
          feedback = verdict["feedback"]
      return {
          "final_draft": draft,
          "iters": max_iters,
          "passed": False,
          "history": history,
      }

  current["drafts"], current["verdicts"] = good_drafts, good_verdicts
  r = optimize("write a tagline", 5)
  print(f"passed={r['passed']} iters={r['iters']} history_len={len(r['history'])} final={r['final_draft']}")

  current["drafts"], current["verdicts"] = bad_drafts, bad_verdicts
  r = optimize("write a tagline", 2)
  print(f"passed={r['passed']} iters={r['iters']} history_len={len(r['history'])} final={r['final_draft']}")
