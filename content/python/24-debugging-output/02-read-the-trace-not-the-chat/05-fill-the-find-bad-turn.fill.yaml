concept: predicate-based-trace-search
prompt: |
  The function `find_first(trace, predicate)` should return the
  first turn where `predicate(turn)` returns `True`, or `None` if
  no turn matches. Fill in the call so the example finds the first
  turn with `tokens > 500`.

  Expected output:
  ```
  bad turn: 2
  ```
code: |
  trace = [
      {"turn": 1, "tokens": 412},
      {"turn": 2, "tokens": 880},
      {"turn": 3, "tokens": 920},
      {"turn": 4, "tokens": 145},
  ]

  def find_first(trace, predicate):
      for t in trace:
          if predicate(t):
              return t
      return None

  bad = ___
  print(f"bad turn: {bad['turn']}")
