xp: 5
estSeconds: 220
concept: write-classify-failure
prompt: |
  Write `classify_failure(trace)` that returns one of
  `"retrieval"`, `"prompt"`, `"hallucination"`, or `"parse"`.

  Apply the priority order from the chapter:

  1. If `trace["retrieved_chunks"]` is non-empty AND
     `trace["retrieved_chunks_match_query"]` is `False` →
     `"retrieval"`.
  2. Else if `trace["raw_output"] != trace["output_after_postprocess"]`
     → `"parse"`.
  3. Else if `trace["retrieved_chunks"]` is empty (the list `[]`) →
     `"hallucination"`.
  4. Else → `"prompt"`.

  Three traces run for you, one per branch. Expected output:
  ```
  retrieval
  parse
  hallucination
  ```
starter: |
  trace_retrieval = {
      "rendered_prompt": "Look up the user's refund.",
      "retrieved_chunks": ["wrong-account ticket"],
      "retrieved_chunks_match_query": False,
      "raw_output": "Your refund was processed.",
      "output_after_postprocess": "Your refund was processed.",
  }

  trace_parse = {
      "rendered_prompt": "Return refund amount as JSON.",
      "retrieved_chunks": ["right ticket"],
      "retrieved_chunks_match_query": True,
      "raw_output": '{"refund": "$48.20"}',
      "output_after_postprocess": '{"refund": "48.20"}',
  }

  trace_hallucination = {
      "rendered_prompt": "When did Acme sign their contract?",
      "retrieved_chunks": [],
      "retrieved_chunks_match_query": None,
      "raw_output": "Acme signed on March 14, 2024.",
      "output_after_postprocess": "Acme signed on March 14, 2024.",
  }

  # define classify_failure(trace) below

  for tr in [trace_retrieval, trace_parse, trace_hallucination]:
      print(classify_failure(tr))
grader:
  kind: stdout-equality
  expected: |
    retrieval
    parse
    hallucination
  normalize: collapse-trailing-newline
solution: |
  trace_retrieval = {
      "rendered_prompt": "Look up the user's refund.",
      "retrieved_chunks": ["wrong-account ticket"],
      "retrieved_chunks_match_query": False,
      "raw_output": "Your refund was processed.",
      "output_after_postprocess": "Your refund was processed.",
  }

  trace_parse = {
      "rendered_prompt": "Return refund amount as JSON.",
      "retrieved_chunks": ["right ticket"],
      "retrieved_chunks_match_query": True,
      "raw_output": '{"refund": "$48.20"}',
      "output_after_postprocess": '{"refund": "48.20"}',
  }

  trace_hallucination = {
      "rendered_prompt": "When did Acme sign their contract?",
      "retrieved_chunks": [],
      "retrieved_chunks_match_query": None,
      "raw_output": "Acme signed on March 14, 2024.",
      "output_after_postprocess": "Acme signed on March 14, 2024.",
  }

  def classify_failure(trace):
      if trace["retrieved_chunks"] and not trace["retrieved_chunks_match_query"]:
          return "retrieval"
      if trace["raw_output"] != trace["output_after_postprocess"]:
          return "parse"
      if not trace["retrieved_chunks"]:
          return "hallucination"
      return "prompt"

  for tr in [trace_retrieval, trace_parse, trace_hallucination]:
      print(classify_failure(tr))
hint:
  - level: 1
    body: 'Four branches, checked in priority order. The order matters — checking hallucination before parse would mislabel a parse bug as a hallucination when retrieval happened to be empty.'
  - level: 2
    body: |
      ```python
      def classify_failure(trace):
          if trace["retrieved_chunks"] and not trace["retrieved_chunks_match_query"]:
              return "retrieval"
          if trace["raw_output"] != trace["output_after_postprocess"]:
              return "parse"
          if not trace["retrieved_chunks"]:
              return "hallucination"
          return "prompt"
      ```
