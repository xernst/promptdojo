xp: 5
estSeconds: 130
concept: build-the-prompt
prompt: |
  A teammate just dropped this in your DMs:

  > "hey can you write me a delete endpoint for our fastapi route file?
  > use the connection pool we already have. just send me the diff to
  > apply, don't write the migration."

  The vague version blows your context window and ships the wrong code.
  Rewrite it using the four core knobs (context, goal/task, constraints,
  format) from the six-knob scaffold the curriculum just taught you.

  `build_prompt` is already defined for you. **Don't change it.** Your
  job is to extract the four pieces from the message above and call it
  with the right arguments.

  The expected output:
  ```
  context: fastapi route file
  goal: add delete handler
  constraints: use existing pool, no migration
  format: diff only
  ```
starter: |
  # build_prompt is given. don't edit it. extract the four pieces from
  # the vague message in the lesson and call it with the right args.

  def build_prompt(context, goal, constraints, format):
      return (
          f"context: {context}\n"
          f"goal: {goal}\n"
          f"constraints: {constraints}\n"
          f"format: {format}"
      )

  print(build_prompt(
      context=...,
      goal=...,
      constraints=...,
      format=...,
  ))

grader:
  kind: stdout-equality
  expected: |
    context: fastapi route file
    goal: add delete handler
    constraints: use existing pool, no migration
    format: diff only
  normalize: collapse-trailing-newline
solution: |
  def build_prompt(context, goal, constraints, format):
      return (
          f"context: {context}\n"
          f"goal: {goal}\n"
          f"constraints: {constraints}\n"
          f"format: {format}"
      )

  print(build_prompt(
      context="fastapi route file",
      goal="add delete handler",
      constraints="use existing pool, no migration",
      format="diff only",
  ))
hint:
  - level: 1
    body: "Read the message line by line. The four pieces are scattered through it. `context` is what file we're touching. `goal` is the one verb. `constraints` are the 'use ... no ...' lines. `format` is what they want back ('diff only')."
  - level: 2
    body: "Replace the four `...` placeholders with the strings: `\"fastapi route file\"`, `\"add delete handler\"`, `\"use existing pool, no migration\"`, `\"diff only\"`. The `build_prompt` function is already correct — leave it alone."
