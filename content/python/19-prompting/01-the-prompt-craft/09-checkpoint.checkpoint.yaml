  parts = ["context", "goal", "constraints", "format"]

  def audit(prompt):
      hits = sum(1 for p in parts if p in prompt)
      if hits == 4:
          return "strong"
      if hits >= 2:
          return "ok"
      return "weak"

  prompt = {
      "context": "fastapi route file",
      "goal": "add delete handler",
      "constraints": "use existing pool",
