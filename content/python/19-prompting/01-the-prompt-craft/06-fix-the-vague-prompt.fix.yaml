brokenCode: |
  parts = ["context", "goal", "constraints", "format"]

  def validate(prompt):
      hits = sum(1 for p in parts if p in prompt)
      return "ok" if hits >= 3 else "needs work"

  prompt = {
      "context": "fastapi route file",
      "goal":    "add a delete handler",
  }

  print(validate(prompt))
