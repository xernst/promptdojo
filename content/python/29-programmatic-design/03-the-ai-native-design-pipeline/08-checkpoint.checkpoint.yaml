solution: |
  teams = [
      {"name": "acme", "steps": [
          {"step": "concept",       "tool": "Claude"},
          {"step": "reference-gen", "tool": "Veo"},
          {"step": "composition",   "tool": "HyperFrames"},
          {"step": "audio",         "tool": "Kokoro"},
          {"step": "captions",      "tool": "Whisper"},
          {"step": "render",        "tool": "hyperframes render"},
          {"step": "review",        "tool": "vision QA"},
      ]},
      {"name": "bravo", "steps": [
          {"step": "concept",       "tool": "GPT-5"},
          {"step": "reference-gen", "tool": "Sora"},
          {"step": "composition",   "tool": "Remotion"},
          {"step": "audio",         "tool": "ElevenLabs"},
          {"step": "render",        "tool": "lambda"},
          {"step": "review",        "tool": "stakeholder review"},
      ]},
      {"name": "charlie", "steps": [
          {"step": "concept",       "tool": "Claude"},
          {"step": "reference-gen", "tool": "Veo"},
          {"step": "composition",   "tool": "HyperFrames"},
          {"step": "render",        "tool": "hyperframes render"},
          {"step": "review",        "tool": "team review"},
      ]},
      {"name": "delta", "steps": [
          {"step": "concept",       "tool": "Claude"},
          {"step": "composition",   "tool": "HyperFrames"},
          {"step": "render",        "tool": "hyperframes render"},
          {"step": "review",        "tool": "team review"},
      ]},
      {"name": "echo", "steps": [
          {"step": "concept",       "tool": "Claude"},
          {"step": "composition",   "tool": "HyperFrames"},
          {"step": "render",        "tool": "hyperframes render"},
      ]},
  ]

  CANONICAL = ["concept", "reference-gen", "composition", "audio", "captions", "render", "review"]

  def audit_pipelines(teams):
      out = {}
      for team in teams:
          covered = set()
          for entry in team["steps"]:
              name = entry.get("step")
              tool = entry.get("tool", "")
              if name in CANONICAL and isinstance(tool, str) and tool.strip():
                  covered.add(name)
          score = min(100, len(covered) * 15)
          missing = [s for s in CANONICAL if s not in covered]
          out[team["name"]] = {"score": score, "missing": missing}
      return out

  results = audit_pipelines(teams)
  for t in teams:
      r = results[t["name"]]
      print(f"{t['name']+':':12s} score={r['score']:<3} missing={r['missing']}")
