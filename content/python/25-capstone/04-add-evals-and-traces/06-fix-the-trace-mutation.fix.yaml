  values, repeated.

  Fix the loop so each turn gets its OWN dict (build a fresh one
  inside the loop), so the trace is a faithful timeline.

  Expected output:
  ```
  [{'turn': 1, 'stop_reason': 'tool_use'}, {'turn': 2, 'stop_reason': 'end_turn'}]
  ```
