solution: |
  RESPONSES = {
      "capital of France?": [
          {"stop_reason": "end_turn", "text": "Paris is the capital.", "usage": {"input_tokens": 30, "output_tokens": 5}},
      ],
      "capital of Atlantis?": [
          {"stop_reason": "tool_use", "text": "", "usage": {"input_tokens": 30, "output_tokens": 10}},
          {"stop_reason": "tool_use", "text": "", "usage": {"input_tokens": 35, "output_tokens": 10}},
          {"stop_reason": "tool_use", "text": "", "usage": {"input_tokens": 40, "output_tokens": 10}},
          {"stop_reason": "tool_use", "text": "", "usage": {"input_tokens": 45, "output_tokens": 10}},
          {"stop_reason": "tool_use", "text": "", "usage": {"input_tokens": 50, "output_tokens": 10}},
      ],
  }

  def fake_create(question, turn_index):
      return RESPONSES[question][turn_index]

  cases = [
      {"question": "capital of France?",   "expected": "Paris",       "max_turns": 3},
      {"question": "capital of Atlantis?", "expected": "Poseidonis",  "max_turns": 3},
  ]

  def run_agent(question):
      trace = []
      for i in range(5):
          response = fake_create(question, i)
          record = {
              "turn": i + 1,
              "stop_reason": response["stop_reason"],
              "tokens": response["usage"]["input_tokens"] + response["usage"]["output_tokens"],
          }
          trace.append(record)
          if response["stop_reason"] == "end_turn":
              return {"answer": response["text"], "trace": trace}
      return {"answer": "capped", "trace": trace}

  def run_eval_suite(cases):
      passed_count = 0
      for c in cases:
          result = run_agent(c["question"])
          ok_answer = c["expected"] in result["answer"]
          ok_turns  = len(result["trace"]) <= c["max_turns"]
          ok_exit   = result["trace"][-1]["stop_reason"] == "end_turn"
          if ok_answer and ok_turns and ok_exit:
              passed_count += 1
      total = len(cases)
      return {
          "total": total,
          "passed": passed_count,
          "failed": total - passed_count,
          "pass_rate": round(passed_count / total, 2) if total else 0.0,
      }

  result = run_eval_suite(cases)
  print(f"total={result['total']} passed={result['passed']} failed={result['failed']} pass_rate={result['pass_rate']}")
