  normalize: collapse-trailing-newline
solution: |
  class MockTextBlock:
      def __init__(self, text):
          self.type = "text"
          self.text = text

  class MockToolUseBlock:
      def __init__(self, id, name, input):
          self.type = "tool_use"
          self.id = id
          self.name = name
          self.input = input

  class MockMessage:
      def __init__(self, stop_reason, content):
          self.stop_reason = stop_reason
          self.content = content

  def extract_text_and_tools(response):
      text_parts = []
      tool_calls = []
      for block in response.content:
          if block.type == "text":
              text_parts.append(block.text)
          elif block.type == "tool_use":
              tool_calls.append({
                  "id": block.id,
                  "name": block.name,
                  "input": block.input,
              })
          # other block types (e.g., thinking) — skipped silently
      return text_parts, tool_calls

  case_1 = MockMessage(
      stop_reason="tool_use",
      content=[
          MockTextBlock("Let me look that up."),
          MockToolUseBlock(id="toolu_01", name="search", input={"q": "ramen"}),
      ],
  )
  case_2 = MockMessage(
      stop_reason="end_turn",
      content=[
          MockTextBlock("Found a 2026 guide."),
          MockTextBlock("Hope this helps!"),
      ],
  )

  text, tools = extract_text_and_tools(case_1)
  print(f"text={text} tools={tools}")
  text, tools = extract_text_and_tools(case_2)
  print(f"text={text} tools={tools}")
