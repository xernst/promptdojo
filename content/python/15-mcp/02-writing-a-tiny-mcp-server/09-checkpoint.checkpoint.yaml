solution: |
  REGISTRY = {
      "add": {
          "description": "Add two numbers.",
          "inputSchema": {
              "type": "object",
              "properties": {"a": {"type": "number"}, "b": {"type": "number"}},
              "required": ["a", "b"],
          },
          "handler": lambda args: str(args["a"] + args["b"]),
      },
      "shout": {
          "description": "Uppercase a string.",
          "inputSchema": {
              "type": "object",
              "properties": {"text": {"type": "string"}},
              "required": ["text"],
          },
          "handler": lambda args: args["text"].upper(),
      },
  }

  def list_tools(registry):
      return [
          {"name": name, "description": meta["description"]}
          for name, meta in registry.items()
      ]

  def call_tool(name, args, registry):
      if name not in registry:
          return {"isError": True, "content": [{"type": "text", "text": f"unknown tool: {name}"}]}
      tool = registry[name]
      for key in tool["inputSchema"]["required"]:
          if key not in args:
              return {"isError": True, "content": [{"type": "text", "text": f"missing required arg: {key}"}]}
      text = tool["handler"](args)
      return {"isError": False, "content": [{"type": "text", "text": text}]}

  print(list_tools(REGISTRY))
  print(call_tool("add", {"a": 2, "b": 3}, REGISTRY)["content"][0]["text"])
  print(call_tool("shout", {"text": "hello"}, REGISTRY)["content"][0]["text"])
  print(call_tool("ghost", {}, REGISTRY)["content"][0]["text"])
