concept: silent-error-antipattern
prompt: |
  Claude shipped this and a teammate spent two days debugging a "missing
  data" bug. `validate_order` calls `int(qty)` which raises `ValueError`
  on bad input, the `except: pass` swallows it, and the function falls
  through to return `None`. The caller has no idea anything went wrong.

  Replace the `try/except` block so bad input fails loudly with a
  `raise ValueError("qty must be positive")`. The call site already
  has the right `try/except` to print the message.

  Expected output:
  ```
  qty must be positive
  ```
brokenCode: |
  def validate_order(qty):
      try:
          qty = int(qty)
          if qty <= 0:
              raise ValueError("qty must be positive")
      except:
          pass
      return qty

  try:
      validate_order(-3)
  except ValueError as e:
      print(e)
grader:
  kind: stdout-equality
  expected: "qty must be positive"
  normalize: collapse-trailing-newline
bugLines:
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
hint:
  - level: 1
    body: "Delete the whole `try/except: pass`. Keep `qty = int(qty)` and `if qty <= 0: raise ValueError(...)` as straight-line code so the exceptions propagate to the caller."
  - level: 2
    body: "Function body becomes: `qty = int(qty)`, then `if qty <= 0: raise ValueError(\"qty must be positive\")`, then `return qty`. The bare `except: pass` was the bug."
revealAfter: 4
