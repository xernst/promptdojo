solution: |
  beats = [
      {"intent": "establish",      "subject": "city",             "duration_sec": 5.0},
      {"intent": "reveal",         "subject": "shop facade",      "duration_sec": 4.0},
      {"intent": "intensify",      "subject": "closing the deal", "duration_sec": 1.5},
      {"intent": "reaction",       "subject": "the buyer",        "duration_sec": 3.0},
      {"intent": "product_beauty", "subject": "the product",      "duration_sec": 3.0},
      {"intent": "resolution",     "subject": "city again",       "duration_sec": 5.0},
  ]

  INTENT_TO_SHOT = {
      "establish":      ("wide",         "slow pan right"),
      "reveal":         ("medium wide",  "dolly out"),
      "intensify":      ("close-up",     "slow push-in"),
      "reaction":       ("medium close", "static"),
      "product_beauty": ("medium",       "orbit 180 degrees"),
      "resolution":     ("wide",         "slow pull-out"),
  }

  def plan_sequence(beats):
      out = []
      for beat in beats:
          shot_type, camera_move = INTENT_TO_SHOT[beat["intent"]]
          shot = {
              "subject": beat["subject"],
              "shot_type": shot_type,
              "camera_move": camera_move,
              "duration_sec": beat["duration_sec"],
          }
          dur = beat["duration_sec"]
          if camera_move == "orbit 180 degrees" and dur < 4.0:
              shot["warning"] = True
          elif camera_move == "slow push-in" and dur < 2.0:
              shot["warning"] = True
          out.append(shot)
      return out

  for s in plan_sequence(beats):
      flag = "WARN" if s.get("warning") else "ok"
      print(f"{s['subject']} / {s['shot_type']} / {s['camera_move']} / {s['duration_sec']} / {flag}")
