solution: |
  briefs = [
      {
          "name": "hero_product_trailer",
          "needs_camera_control": True,
          "needs_audio": False,
          "needs_image_input": True,
          "budget_max_per_sec": 0.40,
          "duration_sec": 6,
      },
      {
          "name": "bulk_perf_marketing",
          "needs_camera_control": False,
          "needs_audio": False,
          "needs_image_input": True,
          "budget_max_per_sec": 0.05,
          "duration_sec": 6,
      },
      {
          "name": "vo_talking_head_premium",
          "needs_camera_control": False,
          "needs_audio": True,
          "needs_image_input": False,
          "budget_max_per_sec": 0.50,
          "duration_sec": 8,
      },
      {
          "name": "budget_social_with_vo",
          "needs_camera_control": False,
          "needs_audio": True,
          "needs_image_input": True,
          "budget_max_per_sec": 0.10,
          "duration_sec": 8,
      },
      {
          "name": "long_narrative_shot",
          "needs_camera_control": False,
          "needs_audio": False,
          "needs_image_input": False,
          "budget_max_per_sec": 0.50,
          "duration_sec": 22,
      },
  ]

  def pick_video_model(task):
      if task.get("needs_camera_control"):
          return "Higgsfield"
      if task.get("budget_max_per_sec", 0) < 0.06:
          return "Hailuo 02"
      if task.get("needs_audio") and task.get("budget_max_per_sec", 0) >= 0.40:
          return "Veo 3"
      if task.get("needs_audio"):
          return "Veo 3.1 Lite"
      if task.get("needs_image_input") and task.get("budget_max_per_sec", 0) < 0.20:
          return "Kling 3.0"
      if task.get("duration_sec", 0) >= 20:
          return "Sora 2 Pro"
      return "Sora 2"

  def route_briefs(briefs):
      return [{"name": b["name"], "model": pick_video_model(b)} for b in briefs]

  for r in route_briefs(briefs):
      print(f"{r['name']:<26} -> {r['model']}")
