solution: |
  from pydantic import BaseModel, ValidationError

  class Invoice(BaseModel):
      number: str
      total: float
      paid: bool

  cases = [
      {"number": "INV-1", "total": 199.99, "paid": False},
      {"number": "INV-2", "total": "abc", "paid": "maybe"},
      {"number": "INV-3", "total": 49.0, "paid": True},
  ]

  def run_validation_suite(cases, schema_class):
      passed_count = 0
      first_failure_fields = []
      for raw in cases:
          try:
              schema_class.model_validate(raw)
              passed_count += 1
          except ValidationError as e:
              if not first_failure_fields:
                  first_failure_fields = [
                      (err["loc"][0] if err["loc"] else "(root)", err["type"])
                      for err in e.errors()
                  ]
      total = len(cases)
      return {
          "total": total,
          "passed": passed_count,
          "failed": total - passed_count,
          "first_failure_fields": first_failure_fields,
      }

  result = run_validation_suite(cases, Invoice)
  print(f"total={result['total']} passed={result['passed']} failed={result['failed']} first_failure_fields={result['first_failure_fields']}")
