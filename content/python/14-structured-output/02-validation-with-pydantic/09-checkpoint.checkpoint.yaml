  Write `run_validation_suite(cases, schema_class)` that:

  - For each `raw` dict in `cases`, calls
    `schema_class.model_validate(raw)`.
  - Returns a dict
    `{"total": <count>, "passed": <count>, "failed": <count>, "first_failure_fields": <list of (field, type) tuples from the FIRST failing case, or empty list if no failures>}`.
