xp: 8
estSeconds: 120
concept: conditionals-recap
prompt: |
  One last thing. AI wrote a discount-rule script. The starter has the right
  branches but the conditions are missing. Finish lines 4 and 6 so the script
  prints `vip discount`.

  Catch: `points = 0` is a valid score (user has a record, just zero). The
  truthy check `if points:` falls through to the wrong branch. Use
  `is not None` so a real zero still counts.
starter: |
  tier = "gold"
  points = 0

  if tier ___ "gold":
      if points ___:
          print("vip discount")
          # both checks pass — user has a tier and a points record
      else:
          print("vip, no points record")
  else:
      print("standard")
grader:
  kind: stdout-equality
  expected: "vip discount"
  normalize: collapse-trailing-newline
solution: |
  tier = "gold"
  points = 0

  if tier == "gold":
      if points is not None:
          print("vip discount")
          # both checks pass — user has a tier and a points record
      else:
          print("vip, no points record")
  else:
      print("standard")
passThreshold: 0.66
hint:
  - level: 1
    body: "Two blanks. Line 4 is a string compare — use `==`. Line 5 is a None-check — use `is not None`."
  - level: 2
    body: "`tier == \"gold\"` and `points is not None`."
