concept: monthly-cost-projector
prompt: |
  Final drill. You're about to ship a feature that runs once per
  user message. Before you click deploy, you want a monthly cost
  projection grounded in **representative prompts and outputs** —
  not a back-of-envelope guess.

  Build `project_monthly_cost(prompts, expected_outputs, daily_volume, in_rate, out_rate, days=30)` that:

  - Pairs each prompt with its expected output (same length lists).
  - Computes the per-call cost for each pair using `estimate_tokens`
    (chars / 4) and the input/output rate formula.
  - Averages those per-call costs to get a representative cost per call.
  - Returns a dict
    `{"avg_cost_per_call": <float>, "daily_spend": <float>, "monthly_spend": <float>}`
    with all values rounded to 4 decimals (monthly to 2).

  One scenario runs for you — a triage bot sampling three real prompt
  shapes (summarize, classify, extract). Expected output:
  ```
  avg cost/call: $0.0013
  daily spend:   $6.53
  monthly spend: $195.75
  ```
