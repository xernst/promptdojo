solution: |
  def estimate_tokens(text):
      return len(text) // 4

  PROMPTS = [
      "Summarize this customer ticket in one sentence so a support engineer can triage it: "
      + "Customer reports that the mobile app has been crashing repeatedly since the 4.1 release; they have reinstalled, cleared cache, and tried a different network. " * 8,

      "Classify the sentiment of the following product review as positive, neutral, or negative and explain why in one sentence: "
      + "I tried the new dashboard feature today and while it loads quickly I found the chart legends confusing and the filter menu is buried two levels deep. " * 8,

      "Extract structured data (name, company, email, role) from this email signature block and return it as JSON: "
      + "John Doe / Director of Operations / Acme Corp / john.doe@acme.example / +1-555-0100 / Boston, MA. " * 8,
  ]
  EXPECTED_OUTPUTS = [
      "Customer reports persistent mobile app crashes since the 4.1 release despite reinstalling, clearing cache, and switching networks.",
      "Mixed review: positive on load speed but negative on chart legends and filter discoverability.",
      '{"name": "John Doe", "company": "Acme Corp", "email": "john.doe@acme.example", "role": "Director of Operations"}',
  ]

  def project_monthly_cost(prompts, expected_outputs, daily_volume, in_rate, out_rate, days=30):
      total = 0.0
      for prompt, output in zip(prompts, expected_outputs):
          in_tokens  = estimate_tokens(prompt)
          out_tokens = estimate_tokens(output)
          cost = (in_tokens / 1_000_000) * in_rate + (out_tokens / 1_000_000) * out_rate
          total += cost
      avg = total / len(prompts)
      daily   = avg * daily_volume
      monthly = daily * days
      return {
          "avg_cost_per_call": round(avg, 4),
          "daily_spend":       round(daily, 4),
          "monthly_spend":     round(monthly, 2),
      }

  result = project_monthly_cost(
      PROMPTS, EXPECTED_OUTPUTS,
      daily_volume=5000,
      in_rate=3.0,
      out_rate=15.0,
  )

  print(f"avg cost/call: ${result['avg_cost_per_call']:.4f}")
  print(f"daily spend:   ${result['daily_spend']:.2f}")
  print(f"monthly spend: ${result['monthly_spend']:.2f}")
