  normalize: collapse-trailing-newline
solution: |
  def estimate_tokens(text):
      return len(text) // 4

  PROMPT = "Summarize the following ticket in one sentence: " \
           "Customer reports the app crashes on launch after the 4.1 update. " \
           "They have tried reinstalling twice with no change."
  EXPECTED_OUTPUT = "App crashes on launch after the 4.1 update; reinstall did not help."

  def estimate_call_cost(prompt, expected_output, in_rate, out_rate):
      in_tokens  = estimate_tokens(prompt)
      out_tokens = estimate_tokens(expected_output)
      cost = (in_tokens / 1_000_000) * in_rate + (out_tokens / 1_000_000) * out_rate
      return round(cost, 6)

  sonnet = estimate_call_cost(PROMPT, EXPECTED_OUTPUT, in_rate=3.0,  out_rate=15.0)
  opus   = estimate_call_cost(PROMPT, EXPECTED_OUTPUT, in_rate=5.0,  out_rate=25.0)

  print(f"sonnet 4.6 cost: ${sonnet:.6f}")
  print(f"opus 4.7 cost:   ${opus:.6f}")
hint:
  - level: 1
    body: 'Three lines inside the function: count input tokens, count output tokens, return the summed cost rounded to 6 decimals. Use `len(text) // 4` (integer division) for the token estimate.'
  - level: 2
    body: |
      The formula:

      ```python
      def estimate_call_cost(prompt, expected_output, in_rate, out_rate):
          in_tokens  = estimate_tokens(prompt)
          out_tokens = estimate_tokens(expected_output)
          cost = (in_tokens / 1_000_000) * in_rate + (out_tokens / 1_000_000) * out_rate
          return round(cost, 6)
      ```

      Opus is ~1.7× the price of Sonnet on both sides. Same call, ~1.7× the bill.
