concept: rewrite-vague-into-specific
prompt: |
  A function `build_prompt()` is supposed to return a production-grade
  prompt with all eight knobs named (subject, composition, lighting,
  style, camera, lens, palette, negatives). The current return value
  is a vague one-liner. Fix it to hit all eight knobs.

  The grader is lenient: it checks that the returned string contains
  at least one phrase for each of the eight knob categories
  (keyword-match), and the call site joins them with newlines.

  Expected output (eight checkmarks):
  ```
  subject      ✓
  composition  ✓
  lighting     ✓
  style        ✓
  camera       ✓
  lens         ✓
  palette      ✓
  negatives    ✓
  ```
brokenCode: |
  KNOB_KEYWORDS = {
      "subject":     ["woman", "man", "person", "subject", "portrait"],
      "composition": ["rule of thirds", "centered", "third", "frame", "composition"],
      "lighting":    ["golden hour", "rim light", "side-lighting", "window light", "natural light"],
      "style":       ["editorial", "cinematic", "documentary", "fashion", "fine art"],
      "camera":      ["35mm camera", "Leica", "shot on", "eye level", "low angle"],
      "lens":        ["85mm", "50mm", "f/1.4", "f/1.8", "shallow depth", "telephoto"],
      "palette":     ["earth tones", "muted", "Kodak Portra", "warm shadows", "monochrome"],
      "negatives":   ["no text", "no watermark", "no harsh", "no extra", "no smile"],
  }

  def build_prompt():
      # bug: vague one-liner, hits zero knobs cleanly
      return "a girl with red hair"

  prompt = build_prompt()
  for knob, keywords in KNOB_KEYWORDS.items():
      hit = any(k.lower() in prompt.lower() for k in keywords)
      mark = "✓" if hit else "✗"
      print(f"{knob:12} {mark}")
bugLines:
  - 13
  - 14
grader:
  kind: stdout-equality
  expected: |
    subject      ✓
    composition  ✓
    lighting     ✓
    style        ✓
    camera       ✓
    lens         ✓
    palette      ✓
    negatives    ✓
  normalize: collapse-trailing-newline
