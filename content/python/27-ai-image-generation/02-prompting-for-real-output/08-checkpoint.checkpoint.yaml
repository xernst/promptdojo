solution: |
  KNOB_KEYWORDS = {
      "subject":     ["woman", "man", "person", "portrait", "subject"],
      "composition": ["rule of thirds", "centered", "third", "frame", "composition"],
      "lighting":    ["golden hour", "rim light", "side-lighting", "window light", "natural light", "studio light"],
      "style":       ["editorial", "cinematic", "documentary", "fashion", "fine art", "illustration"],
      "camera":      ["35mm camera", "leica", "shot on", "eye level", "low angle", "high angle"],
      "lens":        ["85mm", "50mm", "f/1.4", "f/1.8", "shallow depth", "telephoto", "wide angle"],
      "palette":     ["earth tones", "muted", "kodak portra", "warm shadows", "monochrome", "saturated"],
      "negatives":   ["no text", "no watermark", "no harsh", "no extra", "no smile", "no plastic"],
  }

  prompts = {
      "P1": "a girl with red hair",
      "P2": "Portrait of a man. Editorial style, muted tones.",
      "P3": "Portrait of a young woman. Centered composition. Window light. Editorial. 85mm f/1.4.",
      "P4": (
          "Portrait of a young woman with auburn hair. "
          "Rule of thirds. Golden hour side-lighting. "
          "Editorial style. Shot on 35mm camera. 85mm f/1.4. "
          "Muted earth tones."
      ),
      "P5": (
          "Portrait of a young woman with curly auburn hair. "
          "Rule of thirds, subject in left third. "
          "Golden hour side-lighting from a window. "
          "Editorial documentary style. "
          "Shot on 35mm camera, eye level. "
          "85mm f/1.4 lens, shallow depth of field. "
          "Muted earth tones, Kodak Portra palette. "
          "No text, no watermark."
      ),
  }

  def score_image_prompt(prompt):
      low = prompt.lower()
      score = 0
      for knob, keywords in KNOB_KEYWORDS.items():
          if any(k in low for k in keywords):
              score += 1
      return {"score": score}

  def rank_prompts(prompts):
      scored = [(pid, score_image_prompt(p)["score"]) for pid, p in prompts.items()]
      scored.sort(key=lambda x: (-x[1], x[0]))
      return scored

  for pid, score in rank_prompts(prompts):
      print(f"{pid}: score={score}")
