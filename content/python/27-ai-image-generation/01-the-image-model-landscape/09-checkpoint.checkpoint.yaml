solution: |
  tasks = [
      {"task_id": "T1", "needs_text_in_image": True, "budget_per_image": 0.10},
      {"task_id": "T2", "needs_character_consistency": True, "budget_per_image": 0.05},
      {"task_id": "T3", "batch_count": 50, "budget_per_image": 0.05},
      {"task_id": "T4", "subjective_taste": True, "budget_per_image": 0.20},
      {"task_id": "T5", "budget_per_image": 0.01, "instruction_heavy": True},
  ]

  SPECIALISTS = {"ideogram-3", "flux-kontext-pro", "flux-1.1-pro"}

  def pick_image_model(task):
      if task.get("budget_per_image", 1.0) < 0.02:
          return "gpt-image-1-mini"
      if task.get("needs_text_in_image"):
          return "ideogram-3"
      if task.get("needs_character_consistency"):
          return "flux-kontext-pro"
      if task.get("photoreal_art_directed"):
          return "flux-1.1-pro"
      if task.get("batch_count", 1) >= 10:
          return "nano-banana"
      if task.get("subjective_taste"):
          return "midjourney-v7"
      if task.get("instruction_heavy"):
          return "gpt-image-1"
      return "imagen-4"

  def audit_image_pipeline(tasks):
      rows = []
      for t in tasks:
          model = pick_image_model(t)
          rows.append({
              "task_id": t["task_id"],
              "model": model,
              "specialist_used": model in SPECIALISTS,
          })
      return rows

  for row in audit_image_pipeline(tasks):
      print(f"{row['task_id']}: {row['model']:<18} specialist={row['specialist_used']}")
