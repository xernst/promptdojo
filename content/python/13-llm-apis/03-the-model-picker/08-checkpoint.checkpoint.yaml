solution: |
  tasks = [
      {"kind": "ticket_tagger",    "volume_per_day": 50000, "latency_ms_max": 800,   "criticality": "low"},
      {"kind": "support_summary",  "volume_per_day": 5000,  "latency_ms_max": 3000,  "criticality": "medium"},
      {"kind": "contract_review",  "volume_per_day": 4,     "latency_ms_max": 60000, "criticality": "high"},
      {"kind": "fraud_alert",      "volume_per_day": 20000, "latency_ms_max": 1500,  "criticality": "high"},
      {"kind": "architect_review", "volume_per_day": 2,     "latency_ms_max": 60000, "criticality": "high"},
  ]

  RATES = {"haiku": 3.00, "sonnet": 9.00, "opus": 15.00}

  def pick_model(task):
      v, c = task["volume_per_day"], task["criticality"]
      if v >= 10000:
          return "sonnet" if c == "high" else "haiku"
      if v < 100 and c == "high":
          return "opus"
      return "sonnet"

  def cost_aware_routing(tasks):
      routes = {}
      total = 0.0
      for t in tasks:
          model = pick_model(t)
          routes[t["kind"]] = model
          total += t["volume_per_day"] * RATES[model] / 1000
      return {"routes": routes, "total_cost": round(total, 2)}

  result = cost_aware_routing(tasks)
  for t in tasks:
      print(f"{t['kind']:17} -> {result['routes'][t['kind']]}")
  print(f"total daily cost: ${result['total_cost']}")
