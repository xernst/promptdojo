solution: |
  responses = [
      {
          "stop_reason": "end_turn",
          "content": [{"type": "text", "text": "Paris."}],
          "usage": {"input_tokens": 28, "output_tokens": 9},
      },
      {
          "stop_reason": "tool_use",
          "content": [
              {"type": "thinking", "thinking": "internal"},
              {"type": "text", "text": "Let me search."},
              {"type": "tool_use", "id": "t1", "name": "search", "input": {"q": "ramen"}},
          ],
          "usage": {"input_tokens": 41, "output_tokens": 17},
      },
      {
          "stop_reason": "max_tokens",
          "content": [],
          "usage": {"input_tokens": 1024, "output_tokens": 0},
      },
  ]

  def parse_response(response):
      text_parts = [b["text"] for b in response["content"] if b["type"] == "text"]
      tool_uses = [
          {"id": b["id"], "name": b["name"], "input": b["input"]}
          for b in response["content"] if b["type"] == "tool_use"
      ]
      tokens = response["usage"]["input_tokens"] + response["usage"]["output_tokens"]
      return {
          "text": " ".join(text_parts),
          "tool_uses": tool_uses,
          "stop_reason": response["stop_reason"],
          "tokens": tokens,
      }

  for r in responses:
      p = parse_response(r)
      print(f"text={p['text']!r} tool_uses={p['tool_uses']} stop={p['stop_reason']} tokens={p['tokens']}")
hint:
  - level: 1
    body: 'Two list comprehensions over `response["content"]`: one filters for text blocks and pulls `.text`; one filters for tool_use blocks and builds the tuple dict. Sum input + output tokens for the total.'
