xp: 5
estSeconds: 200
concept: response-parser
prompt: |
  Write `parse_response(response)` that takes a response dict (from
  Anthropic's messages.create) and returns a structured dict:

  - `text` — string, joined text from all `text`-type blocks (joined
    with one space; empty string if none).
  - `tool_uses` — list of `{"id": ..., "name": ..., "input": ...}`
    dicts, one per `tool_use`-type block.
  - `stop_reason` — copy `response["stop_reason"]` through.
  - `tokens` — int, sum of `usage.input_tokens + usage.output_tokens`.

  Skip any block whose type is neither `text` nor `tool_use` (e.g.,
  `thinking` blocks).

  Three responses run for you. Expected output:
  ```
  text='Paris.' tool_uses=[] stop=end_turn tokens=37
  text='Let me search.' tool_uses=[{'id': 't1', 'name': 'search', 'input': {'q': 'ramen'}}] stop=tool_use tokens=58
  text='' tool_uses=[] stop=max_tokens tokens=1024
  ```
starter: |
  responses = [
      {
          "stop_reason": "end_turn",
          "content": [{"type": "text", "text": "Paris."}],
          "usage": {"input_tokens": 28, "output_tokens": 9},
      },
      {
          "stop_reason": "tool_use",
          "content": [
              {"type": "thinking", "thinking": "internal"},
              {"type": "text", "text": "Let me search."},
              {"type": "tool_use", "id": "t1", "name": "search", "input": {"q": "ramen"}},
          ],
          "usage": {"input_tokens": 41, "output_tokens": 17},
      },
      {
          "stop_reason": "max_tokens",
          "content": [],
          "usage": {"input_tokens": 1024, "output_tokens": 0},
      },
  ]

  # define parse_response(response) below

  for r in responses:
      p = parse_response(r)
      print(f"text={p['text']!r} tool_uses={p['tool_uses']} stop={p['stop_reason']} tokens={p['tokens']}")
