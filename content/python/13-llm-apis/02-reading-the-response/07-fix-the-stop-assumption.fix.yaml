concept: stop-reason-correct-string
prompt: |
  Cursor wrote this loop with `if response["stop_reason"] == "stop":`.
  But Anthropic's actual stop reason is `"end_turn"`, not `"stop"`.
  The condition never fires; the loop runs to its iteration cap and
  returns `"capped"` even though the model finished cleanly on turn 1.

  Fix the comparison to use the correct stop_reason string.

  Expected output:
  ```
  result: done in 1 turns
  ```
brokenCode: |
  responses = [{"stop_reason": "end_turn", "content": [{"type": "text", "text": "Paris"}]}]

  def fake_call(messages, turn):
      return responses[turn]

  def loop(messages):
      for turn in range(5):
          response = fake_call(messages, turn)
          # bug: wrong string. Anthropic uses "end_turn", not "stop".
          if response["stop_reason"] == "stop":
              return f"done in {turn + 1} turns"
      return "capped"

  print(f"result: {loop([{'role': 'user', 'content': 'capital of France?'}])}")
