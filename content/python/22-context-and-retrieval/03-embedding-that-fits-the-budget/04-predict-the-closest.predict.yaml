concept: closest-vector-by-cosine
code: |
  # three "document" embeddings and one "query" embedding.
  # predict which document is closest by cosine similarity.

  import math

  def cosine(a, b):
      dot = sum(x * y for x, y in zip(a, b))
      na = math.sqrt(sum(x * x for x in a))
      nb = math.sqrt(sum(y * y for y in b))
      return dot / (na * nb)

  vectors = {
      "doc_a": [0.9, 0.1, 0.0, 0.0],   # "reset password"
      "doc_b": [0.1, 0.9, 0.0, 0.0],   # "cancel subscription"
      "doc_c": [0.0, 0.0, 0.9, 0.1],   # "export data"
  }
  query = [0.8, 0.2, 0.0, 0.0]          # "forgot my password"

  for name, vec in vectors.items():
      print(f"{name}: {cosine(query, vec):.4f}")

  best = max(vectors.items(), key=lambda kv: cosine(query, kv[1]))
  print(f"closest: {best[0]}")
