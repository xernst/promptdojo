prompt: |
  Cosine similarity has two pieces: the **dot product** of two
  vectors (numerator) divided by the **product of their norms**
  (denominator). Fill in the two expressions.

  - The dot product is the sum over `i` of `a[i] * b[i]`.
  - The norm of a vector is `sqrt(sum of squares)`.

  Expected output:
  ```
  0.9910
  ```
code: |
  import math

  a = [0.8, 0.2, 0.0, 0.0]
  b = [0.9, 0.1, 0.0, 0.0]

  dot = ___
  norm_a = math.sqrt(sum(x * x for x in a))
  norm_b = ___

  cosine = dot / (norm_a * norm_b)
  print(f"{cosine:.4f}")
