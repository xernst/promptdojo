hint:
  - level: 1
    body: "Look at the doc embedding step — it uses `embed_a`. The query is using `embed_b`. The vectors aren't in the same space. Change the query line to use the same function as the docs."
  - level: 2
    body: |
      ```python
      query_vec = embed_a("reset my password")
      ```
      Rule of thumb: route every embedding through ONE function in your codebase. If `embed_query()` and `embed_doc()` exist as separate functions, they're an accident waiting to happen — wrap them both around the same model call.
