xp: 5
estSeconds: 200
concept: rank-by-cosine-similarity
prompt: |
  Write `rank_by_similarity(query_vec, doc_vecs)` that returns a
  list of doc INDICES sorted by descending cosine similarity to the
  query. The highest-scoring doc comes first.

  - Input: a query vector and a list of doc vectors (all the same dim).
  - Output: list of indices into `doc_vecs`, sorted best-first.
  - Use cosine similarity (dot product / product of norms).

  A query and four docs run for you. The query points heavily in
  the first dimension. Doc 1 matches it closely. Doc 3 is the
  next-closest. Docs 2 and 0 point elsewhere.

  Expected output:
  ```
  [1, 3, 2, 0]
  ```
starter: |
  import math

  # write rank_by_similarity(query_vec, doc_vecs) below

  query = [0.9, 0.1, 0.0, 0.0]
  doc_vecs = [
      [0.1, 0.9, 0.0, 0.1],    # 0 — cancel subscription (off direction)
      [0.85, 0.15, 0.05, 0.0], # 1 — reset password (near twin of query)
      [0.2, 0.1, 0.8, 0.3],    # 2 — enterprise pricing (off direction)
      [0.5, 0.5, 0.2, 0.4],    # 3 — partial match
  ]
  print(rank_by_similarity(query, doc_vecs))
grader:
  kind: stdout-equality
  expected: "[1, 3, 2, 0]"
  normalize: collapse-trailing-newline
solution: |
  import math

  def rank_by_similarity(query_vec, doc_vecs):
      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          na = math.sqrt(sum(x * x for x in a))
          nb = math.sqrt(sum(y * y for y in b))
          return dot / (na * nb)

      scored = [(i, cosine(query_vec, v)) for i, v in enumerate(doc_vecs)]
      scored.sort(key=lambda t: -t[1])
      return [i for i, _ in scored]

  query = [0.9, 0.1, 0.0, 0.0]
  doc_vecs = [
      [0.1, 0.9, 0.0, 0.1],
      [0.85, 0.15, 0.05, 0.0],
      [0.2, 0.1, 0.8, 0.3],
      [0.5, 0.5, 0.2, 0.4],
  ]
  print(rank_by_similarity(query, doc_vecs))
hint:
  - level: 1
    body: "Three steps: (1) compute cosine of `query_vec` against each entry in `doc_vecs`, keeping track of the index, (2) sort by descending score, (3) return just the indices. `enumerate(doc_vecs)` gives you `(i, vec)` pairs to start with."
  - level: 2
    body: |
      ```python
      scored = [(i, cosine(query_vec, v)) for i, v in enumerate(doc_vecs)]
      scored.sort(key=lambda t: -t[1])
      return [i for i, _ in scored]
      ```
      The `key=lambda t: -t[1]` trick sorts descending without needing `reverse=True`. Equivalent.
