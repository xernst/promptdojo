concept: position-bias-aware-pairwise
prompt: |
  Final drill. Build a pairwise judge that detects its OWN position
  bias and returns `tie` when it disagrees with itself across orders.

  Write `pairwise(question, output_a, output_b)` that:

  - Calls `fake_judge(question, first, second)` twice:
    - Once with `first=output_a, second=output_b` — read result as
      "the output named output_a sits in slot A this round."
    - Once with `first=output_b, second=output_a` — output_b is now
      in slot A.
  - Each call returns `"A"` or `"B"` (the *slot* that won).
  - Translate slot wins back to which physical output won that round.
  - If the SAME physical output won both rounds, return that output's
    label (`"a"` or `"b"`).
  - If the rounds disagreed, return `"tie"`.

  Then run a multi-case suite. Expected output:
  ```
  case 1: a wins  (consistent)
  case 2: tie     (position-biased — judge disagrees with itself)
  case 3: b wins  (consistent)
  ```
starter: |
  # the fake judge has a known length bias: always picks slot with the longer string.
  def fake_judge(question, first, second):
      return "A" if len(first) > len(second) else "B"

  # define pairwise(question, output_a, output_b) below

  cases = [
      # case 1: output_a is genuinely longer → wins both orders → "a wins"
      ("Pick the better answer.", "A long detailed correct answer here.", "Short."),
      # case 2: equal length → judge fluctuates → "tie"
      ("Pick the better answer.", "Same exact length here", "Same exact length here"),
      # case 3: output_b is genuinely longer → wins both orders → "b wins"
      ("Pick the better answer.", "Brief.", "A long detailed correct answer here."),
  ]

  for i, (q, a, b) in enumerate(cases, start=1):
      result = pairwise(q, a, b)
      label = "a wins  (consistent)" if result == "a" else \
              "b wins  (consistent)" if result == "b" else \
              "tie     (position-biased — judge disagrees with itself)"
      print(f"case {i}: {label}")
